# Allow Grafana → Internal RDS (PostgreSQL)
# Grafana stores dashboard config, users, and sessions in RDS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana-rds
  namespace: observability
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  policyTypes:
    - Egress
  egress:
    # Allow PostgreSQL traffic to internal RDS instances
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8    # Internal VPC CIDR covering RDS subnets
      ports:
        - protocol: TCP
          port: 5432             # PostgreSQL default port

    # Allow Vault access for secret fetching
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
      ports:
        - protocol: TCP
          port: 8200             # Vault API port
